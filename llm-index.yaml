# LLM Repo Index for S22 Web Agent
#
# Purpose:
#   Provide a compact, safe navigation map for AI-assisted repo work.
#   This file is documentation only and must never contain secrets.

project:
  name: s22-web-agent
  repository: amir89hamzah/s22-web-agent
  local_path: ~/projects/mobile-job-radar-agent
  device: Samsung Galaxy S22
  host_environment: Termux from Google Play
  purpose: "Controlled mobile-hosted MCP and browser automation execution node"
  current_phase: "Phase 7P-0 documentation reconciliation complete"
  next_focus: "Phase 7P operator-quality profile lifecycle helpers"

latest_checkpoint:
  phase: Phase 7O-E
  status: pass
  label: long-gap session continuity
  profile: github-manual-local
  target: https://github.com/settings/profile
  expected_text: Public profile
  proof_doc: docs/phase-7o-e-long-gap-session-continuity.md
  result:
    - authenticated GitHub dummy session survived full S22 power-off and restart
    - approximately one week offline
    - runtime shutdown
    - SSH reconnect
    - repeated headless reuse
    - VNC and noVNC were not started
    - login was not repeated
    - authenticated text excerpt remained suppressed
    - no cookie or session values were printed

high_level_status:
  local_cli_api_scanner: pass
  sqlite_reporting: pass
  mcp_stdio: pass
  mcp_streamable_http: pass
  route_a_cloudflare_public_mcp: pass
  openai_secure_mcp_tunnel: pass
  debian_proot_playwright_worker: pass
  manual_login_vnc: pass
  stable_tmux_vnc: pass
  local_novnc: pass
  temporary_cloudflare_access_novnc: pass
  playwright_storage_state_capture: pass
  profile_domain_allowlist: pass
  mcp_browser_scan_with_profile: pass
  real_github_dummy_authenticated_scan: pass
  repeated_session_reuse: pass
  long_gap_session_continuity: pass
  oauth: not_started_intentionally
  cookie_json_import: deferred
  phase_7p_profile_lifecycle: next

ports:
  "3001":
    service: local HTTP API
    public_exposure: never
  "3002":
    service: Debian proot Playwright worker
    public_exposure: never
  "3003":
    service: MCP Streamable HTTP
    public_exposure: intentional protected MCP route only
  "5901":
    service: raw VNC
    public_exposure: never
  "6080":
    service: noVNC/websockify
    public_exposure: temporary protected human-controlled route only
  "3107":
    service: local demo login server
    public_exposure: never

core_architecture:
  termux:
    api_server:
      entrypoint: src/server.js
      commands:
        start: npm run api:start
        status: npm run api:status
        stop: npm run api:stop
    mcp_http_server:
      entrypoint: src/mcp-http-server.mjs
      commands:
        start: npm run mcp:http:start
        status: npm run mcp:http:status
        stop: npm run mcp:http:stop
    mcp_stdio_server:
      entrypoint: src/mcp-server.mjs
      command: npm run mcp
  debian_proot:
    playwright_worker:
      entrypoint: tools/proot-playwright-worker/server.mjs
      browser: Chromium
    openai_tunnel_client:
      profile: s22-web-agent-local
      run_from: Debian proot
      note: "Direct Termux execution previously failed with unexpected e_type: 2."
  session_gateway:
    profile_root: .runtime/sessions/<profile>/
    profile_files:
      - storageState.json
      - metadata.json
    git_tracked: false
    raw_vnc_bind: 127.0.0.1:5901
    novnc_default_bind: 127.0.0.1:6080

runtime_modes:
  local_cli_api:
    use_when: local scanning and API development
    commands:
      scan: node src/index.js scan example.com
      start: npm run api:start
      status: npm run api:status
      stop: npm run api:stop
    tunnel_required: false

  mcp_local:
    use_when: local MCP client or Inspector testing
    commands:
      stdio: npm run mcp
      http_start: npm run mcp:http:start
      http_status: npm run mcp:http:status
      http_stop: npm run mcp:http:stop

  route_a_cloudflare:
    use_when: intentional public MCP demo
    endpoint: https://s22agent.aidesk.rest/mcp
    commands:
      start: npm run route:a:start
      status: npm run route:a:status
      stop: npm run route:a:stop
    constraints:
      - expose only MCP port 3003
      - keep API port 3001 private
      - keep Playwright worker port 3002 private
      - use bearer authentication

  openai_secure_mcp_tunnel:
    use_when: private ChatGPT Custom App integration
    commands:
      termux_start: npm run openai:tunnel:start
      debian_client: npm run openai:tunnel:client:debian
      status: npm run openai:tunnel:status
      stop: npm run openai:tunnel:stop
    constraints:
      - do not start Route A in this mode
      - prompt for the runtime key locally
      - never commit the runtime key

  local_manual_login:
    use_when: user must create or refresh a website session
    commands:
      start: "SESSION_LOGIN_TIMEOUT_MS=1200000 npm run session:manual-login:novnc:start -- <profile> <login-url>"
      status: "npm run session:manual-login:novnc:status -- <profile>"
      complete: "SESSION_SCAN_SUPPRESS_EXCERPT=1 npm run session:manual-login:novnc:complete -- <profile> <authenticated-url> \"<expected-text>\""
      cancel: "npm run session:manual-login:novnc:cancel -- <profile>"
    constraints:
      - human-controlled login only
      - never auto-start public noVNC
      - never perform automatic credential entry

  temporary_public_novnc:
    use_when: explicitly approved remote human-login proof only
    protection_layers:
      - Cloudflare Access
      - VNC or noVNC authentication
      - target website login
    commands:
      guide_start: "npm run session:novnc:public-temp:start-guide -- <public-host>"
      guide_status: "npm run session:novnc:public-temp:status -- <public-host>"
      guide_stop: "npm run session:novnc:public-temp:stop-guide -- <public-host>"
      tunnel_start: npm run session:novnc:public-temp:tunnel:start
      tunnel_status: npm run session:novnc:public-temp:tunnel:status
      tunnel_stop: npm run session:novnc:public-temp:tunnel:stop
    constraints:
      - temporary
      - intentionally started
      - human-controlled
      - never started by profile ensure logic
      - rotate the historical tunnel token before another public test

session_profile_current:
  scan_command: "SESSION_SCAN_SUPPRESS_EXCERPT=1 npm run session:profile:scan -- <profile> <url> \"<expected-text>\""
  wrapper: scripts/session-profile-scan.sh
  worker: tools/proot-playwright-worker/session-profile-scan.mjs
  behavior:
    - validate a safe profile name
    - resolve storageState internally
    - read metadata domain allowlist
    - reject domain mismatch
    - launch headless Chromium in Debian proot
    - verify optional expected text
    - suppress authenticated excerpt when requested
    - never print cookie or storageState values

phase_7p_plan:
  goal: "Distinguish local profile presence from live remote website validity and provide safe reuse-first operator guidance."
  required_states:
    - missing
    - present_unverified
    - valid
    - expired_or_logged_out
    - domain_mismatch
    - runtime_error
  commands:
    status:
      npm_name: session:profile:status
      browser_launch: false
      purpose: inspect local profile files and metadata
      normal_existing_state: present_unverified
    probe:
      npm_name: session:profile:probe
      browser_launch: true
      runtime: Debian proot
      purpose: verify expected authenticated text with the saved profile
      success_state: valid
      missing_marker_state: expired_or_logged_out
    ensure:
      npm_name: session:profile:ensure
      purpose: combine status and probe and print safe refresh guidance
      success_condition: valid
      auto_start_vnc: false
      auto_start_novnc: false
      auto_start_public_novnc: false
      automatic_credentials: false
  acceptance_examples:
    - unknown profile returns missing
    - existing artifacts without a live probe return present_unverified
    - correct domain and authenticated marker return valid
    - wrong target host returns domain_mismatch
    - loaded page without authenticated marker returns expired_or_logged_out
    - browser, network, JSON, or runtime failure returns runtime_error

mcp_tools:
  scanner:
    - job_radar_health
    - job_radar_scan
    - job_radar_list_pages
    - job_radar_get_page
    - job_radar_get_report
  browser:
    - browser_inspect_url
    - browser_scan_url
    - browser_scan_with_profile
  manual_login:
    - browser_start_manual_login
    - browser_manual_login_status
    - browser_complete_manual_login
    - browser_cancel_manual_login
  authenticated_profile_input_boundary:
    accepted:
      - named profile
      - target URL
      - optional expected text
    forbidden:
      - password
      - cookie
      - token
      - MFA code
      - arbitrary storageState path
      - storageState JSON

security_rules:
  - Never request or print passwords.
  - Never request or print cookies.
  - Never request or print session tokens.
  - Never request or print MFA codes.
  - Never print or paste storageState JSON.
  - Keep .runtime session files out of git.
  - Keep API port 3001 local-only.
  - Keep Playwright worker port 3002 local-only.
  - Keep raw VNC port 5901 local-only.
  - Keep noVNC local-only by default.
  - Public noVNC must be temporary, protected, intentionally started, and human-controlled.
  - Profile fallback logic must never auto-start public noVNC.
  - Keep MCP_HTTP_TOKEN out of git.
  - Keep CLOUDFLARE_TUNNEL_TOKEN out of git.
  - Keep CONTROL_PLANE_API_KEY out of git.
  - Rotate the historical Cloudflare tunnel token before future public testing.
  - Do not upgrade npm major version during Phase 7P only because an update notice appears.
  - Do not propose Termux F-Droid migration by default.

known_issues:
  - Android may kill Termux under heavy runtime load.
  - tmux protects against SSH disconnect but not Android terminating Termux.
  - AnyDesk plus SSH plus VNC plus noVNC plus Chromium may cause disconnects.
  - Profile file existence does not prove a remote website session is valid.
  - Remote websites can expire, revoke, or challenge sessions.
  - Termux or Android may restrict listener inspection through ss or netlink.
  - An early raw cloudflared log exposed a tunnel token before helper hardening.

