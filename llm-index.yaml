llm_guidance:
  before_code_changes:
    - review README.md, TODO.md, llm-index.yaml, package.json, and relevant session helpers
    - preserve all port and secret boundaries
    - do not assume profile existence means valid remote login
  when_testing_authenticated_profiles:
    - use dummy or safe accounts
    - set SESSION_SCAN_SUPPRESS_EXCERPT=1
    - use expected authenticated text
    - never print secret artifacts
  when_profile_is_missing_or_expired:
    - print local manual-login refresh instructions
    - do not auto-start VNC
    - do not auto-start noVNC
    - never auto-start public noVNC
  when_user_mentions_termux_distribution:
    - current installation is Google Play
    - do not recommend migration by default
    - consider distribution differences only as a troubleshooting hypothesis for unusual dependency, proot, linker, permission, add-on, or executable behavior
