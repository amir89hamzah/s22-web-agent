  cookie_json_import: deferred
  phase_7p_profile_lifecycle: next

core_architecture:
  termux:
    api_server:
      port: 3001
      bind_intent: local_only
      public_exposure: never
      entrypoint: src/server.js
      commands:
        start: npm run api:start
        status: npm run api:status
        stop: npm run api:stop
    mcp_http_server:
      port: 3003
      entrypoint: src/mcp-http-server.mjs
      commands:
        start: npm run mcp:http:start
        status: npm run mcp:http:status
        stop: npm run mcp:http:stop
      public_exposure:
        route_a: Cloudflare Named Tunnel when intentionally started
        openai_secure_tunnel: local target for Debian tunnel-client
    mcp_stdio_server:
      entrypoint: src/mcp-server.mjs
      command: npm run mcp
    sqlite:
      storage: local_runtime_data
      git_tracked: false
  debian_proot:
    playwright_worker:
      port: 3002
      public_exposure: never
      entrypoint: tools/proot-playwright-worker/server.mjs
      browser: Chromium
    openai_tunnel_client:
      run_from: Debian proot
      profile: s22-web-agent-local
      note: Direct Termux execution previously failed with unexpected e_type: 2.
  session_gateway:
    raw_vnc:
      port: 5901
      bind: 127.0.0.1
      public_exposure: never
    novnc:
      port: 6080
      bind_default: 127.0.0.1
      public_exposure: temporary_protected_only_when_intentionally_started
    demo_login_server:
      port: 3107
      public_exposure: never
    profile_storage:
      root: .runtime/sessions/<profile>/
      files:
        - storageState.json
        - metadata.json
      git_tracked: false

exposure_policy:
  never_public:
    - port 3001 API
    - port 3002 Playwright worker
    - port 5901 raw VNC
    - port 3107 demo login server
  conditional:
    - port 3003 MCP through intentional protected route
    - port 6080 noVNC only through temporary protected human-controlled route
  public_hostnames:
    mcp: s22agent.aidesk.rest
    temporary_login: s22login.aidesk.rest
  route_separation:
    - MCP and human-login routes are separate concerns
    - public noVNC must never replace or modify the MCP route

runtime_modes:
  local_cli_api:
    use_when: local scanning and API development
    commands:
      scan: node src/index.js scan example.com
      api_start: npm run api:start
      api_status: npm run api:status
      api_stop: npm run api:stop
    tunnel_required: false

  mcp_local:
    use_when: local MCP client or Inspector testing
    commands:
      stdio: npm run mcp
      http_start: npm run mcp:http:start
      http_status: npm run mcp:http:status
      http_stop: npm run mcp:http:stop

  route_a_cloudflare:
    use_when: intentional public MCP demo
    endpoint: https://s22agent.aidesk.rest/mcp
    commands:
      start: npm run route:a:start
      status: npm run route:a:status
      stop: npm run route:a:stop
    constraints:
      - expose only MCP port 3003
      - keep API 3001 private
      - keep worker 3002 private
      - use bearer authentication

  openai_secure_mcp_tunnel:
    use_when: private ChatGPT Custom App integration
    flow: ChatGPT Custom App -> OpenAI tunnel -> Debian tunnel-client -> Termux MCP 3003 -> API 3001
    commands:
      termux_start: npm run openai:tunnel:start
      debian_client: npm run openai:tunnel:client:debian
      status: npm run openai:tunnel:status
      stop: npm run openai:tunnel:stop
    constraints:
      - do not start Route A in this mode
      - runtime key is prompted locally
      - runtime key is never committed

  local_manual_login:
    use_when: user must refresh or create a website session
    flow: local noVNC -> local VNC -> visible Debian Chromium -> human login -> local storageState
    commands:
      start: SESSION_LOGIN_TIMEOUT_MS=1200000 npm run session:manual-login:novnc:start -- <profile> <login-url>
      status: npm run session:manual-login:novnc:status -- <profile>
      complete: SESSION_SCAN_SUPPRESS_EXCERPT=1 npm run session:manual-login:novnc:complete -- <profile> <authenticated-url> "<expected-text>"
      cancel: npm run session:manual-login:novnc:cancel -- <profile>
    automatic_public_route: forbidden

  temporary_public_novnc:
    use_when: explicitly approved remote human login proof only
    protection: Cloudflare Access plus VNC/noVNC authentication plus target-site login
    commands:
      guide_start: npm run session:novnc:public-temp:start-guide -- <public-host>
      guide_status: npm run session:novnc:public-temp:status -- <public-host>
      guide_stop: npm run session:novnc:public-temp:stop-guide -- <public-host>
      tunnel_start: npm run session:novnc:public-temp:tunnel:start
      tunnel_status: npm run session:novnc:public-temp:tunnel:status
      tunnel_stop: npm run session:novnc:public-temp:tunnel:stop
    constraints:
      - temporary
      - intentionally started
      - human-controlled
      - never auto-started by profile ensure logic
      - token rotation required before future public testing

session_profile_current_commands:
  scan:
    command: SESSION_SCAN_SUPPRESS_EXCERPT=1 npm run session:profile:scan -- <profile> <url> "<expected-text>"
    implementation:
      wrapper: scripts/session-profile-scan.sh
      worker: tools/proot-playwright-worker/session-profile-scan.mjs
    behavior:
      - validates safe profile name
      - resolves storageState internally
      - reads metadata domain allowlist
      - rejects domain mismatch
      - launches headless Chromium in Debian proot
      - can verify expected text
      - suppresses authenticated excerpt when environment flag is set
      - never prints cookie or storageState values

phase_7p_plan:
  goal: Distinguish local profile presence from live remote website validity and provide safe reuse-first operator guidance.
  commands:
    status:
      npm_name: session:profile:status
      browser_launch: false
      purpose: inspect profile files and metadata locally
      expected_state_when_artifacts_exist: present_unverified
    probe:
      npm_name: session:profile:probe
      browser_launch: true
      runtime: Debian proot
      purpose: verify expected authenticated text using saved profile
      success_state: valid
      missing_marker_state: expired_or_logged_out
    ensure:
      npm_name: session:profile:ensure
      purpose: combine status and probe, then print safe refresh guidance
      success_condition: valid
      auto_start_vnc: false
      auto_start_novnc: false
      auto_start_public_novnc: forbidden
      automatic_credentials: forbidden
  required_states:
    - missing
    - present_unverified
    - valid
    - expired_or_logged_out
    - domain_mismatch
    - runtime_error
  acceptance_examples:
    - unknown profile -> missing
    - existing artifacts without live probe -> present_unverified
    - correct domain and authenticated marker -> valid
    - wrong target host -> domain_mismatch
    - page loads without authenticated marker -> expired_or_logged_out
    - browser, network, JSON, or runtime failure -> runtime_error

mcp_tools:
  scanner:
    - job_radar_health
    - job_radar_scan
    - job_radar_list_pages
    - job_radar_get_page
    - job_radar_get_report
  browser:
    - browser_inspect_url
    - browser_scan_url
    - browser_scan_with_profile
  manual_login:
    - browser_start_manual_login
    - browser_manual_login_status
    - browser_complete_manual_login
    - browser_cancel_manual_login
  profile_scan_input_boundary:
    accepted:
      - named profile
      - target URL
      - optional expected text
    forbidden:
      - password
      - cookie
      - token
      - MFA code
      - arbitrary storageState path
      - storageState JSON

security_rules:
  - Never request or print passwords.
  - Never request or print cookies.
  - Never request or print session tokens.
  - Never request or print MFA codes.
  - Never print or paste storageState JSON.
  - Keep .runtime session files out of git.
  - Keep API port 3001 local-only.
  - Keep Playwright worker port 3002 local-only.
  - Keep raw VNC port 5901 local-only.
  - Keep noVNC local-only by default.
  - Public noVNC must be temporary, protected, intentionally started, and human-controlled.
  - Profile fallback logic must never auto-start public noVNC.
  - Keep MCP_HTTP_TOKEN out of git.
  - Keep CLOUDFLARE_TUNNEL_TOKEN out of git.
  - Keep CONTROL_PLANE_API_KEY out of git.
  - Rotate the Cloudflare tunnel token before future public testing.
  - Do not upgrade npm major version during Phase 7P only because an update notice appears.
  - Do not propose Termux F-Droid migration by default.

known_issues:
  - Android may kill Termux under heavy runtime load.
  - tmux protects against SSH disconnect but not Android terminating Termux.
  - AnyDesk plus SSH plus VNC plus noVNC plus Chromium may cause disconnects.
  - Profile file existence does not prove a remote website session is valid.
  - Remote websites can expire, revoke, or challenge sessions.
  - Termux or Android may restrict listener inspection through ss or netlink.
  - An early raw cloudflared log exposed a tunnel token before helper hardening.

