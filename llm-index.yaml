  local_novnc: pass
  temporary_cloudflare_access_novnc: pass
  playwright_storage_state_capture: pass
  profile_domain_allowlist: pass
  mcp_browser_scan_with_profile: pass
  real_github_dummy_authenticated_scan: pass
