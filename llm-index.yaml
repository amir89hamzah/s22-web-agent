# LLM Repo Index for S22 Web Agent
# Documentation only. Never store secrets here.

project:
  name: s22-web-agent
  repository: amir89hamzah/s22-web-agent
  local_path: ~/projects/mobile-job-radar-agent
  device: Samsung Galaxy S22
  host_environment: Termux from Google Play
  purpose: "Controlled mobile-hosted MCP and browser automation execution node"
  current_phase: "Documentation Closure — Operator & Reproducibility"
  latest_completed_runtime_proof: "Phase 7V Automatic Protected On-Demand noVNC Handoff"

latest_checkpoint:
  phase: Phase 7V
  status: pass
  proof_doc: docs/phase-7v-automatic-novnc-handoff.md
  verified:
    - unified one-command operator lifecycle from Phase 7U remains the normal path
    - automatic local noVNC start during browser-control handoff
    - automatic protected Cloudflare connector start
    - full public noVNC browser-control URL returned
    - same persistent Chromium session preserved during human control
    - public connector and local noVNC stopped after handoff completion
    - normal MCP HTTP surface remains exactly eight intended tools

phase_7p:
  status: implemented_live_device_verification_pending
  primary_doc: docs/phase-7p-profile-lifecycle-helpers.md
  commands:
    status: npm run session:profile:status -- <profile> [target-url]
    probe: "npm run session:profile:probe -- <profile> <authenticated-url> \"<expected-text>\""
    ensure: "npm run session:profile:ensure -- <profile> <authenticated-url> \"<expected-text>\" [login-url]"
    self_test: npm run session:profile:self-test
  states:
    missing:
      exit_code: 20
      meaning: one or more required profile artifacts are absent
    present_unverified:
      exit_code: 0
      meaning: local artifacts are readable but remote login was not probed
    valid:
      exit_code: 0
      meaning: live browser probe found the authenticated marker
    expired_or_logged_out:
      exit_code: 21
      meaning: page loaded but the authenticated marker was absent
    domain_mismatch:
      exit_code: 22
      meaning: target host is outside the profile allowlist
    runtime_error:
      exit_code: 23
      meaning: invalid input, JSON, browser, network, or runtime failure
  implementation_files:
    - tools/session-profile-common.mjs
    - tools/session-profile-status.mjs
    - tools/proot-playwright-worker/session-profile-probe.mjs
    - scripts/session-profile-status.sh
    - scripts/session-profile-probe.sh
    - scripts/session-profile-ensure.sh
    - scripts/session-profile-self-test.sh
  repository_validation:
    javascript_syntax: pass
    shell_syntax: pass
    local_classifier_test: pass
    covered_states:
      - missing
      - present_unverified
      - domain_mismatch
      - runtime_error
  pending_s22_validation:
    - run self-test in Termux
    - verify github-manual-local status is present_unverified
    - verify live GitHub probe is valid
    - verify ensure result is valid
    - verify unknown profile is missing
    - verify wrong domain is domain_mismatch
    - verify no VNC/noVNC/public tunnel starts
    - verify git working tree remains clean
  safety:
    - status does not launch Chromium
    - probe suppresses page excerpts by design
    - ensure never starts VNC
    - ensure never starts noVNC
    - ensure never starts Cloudflare
    - ensure never starts a public route
    - ensure does not echo supplied URLs in refresh guidance
    - refresh instructions contain placeholders only
    - no automatic credential entry

