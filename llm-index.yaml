  cli_api_scanner: pass
  sqlite_reporting: pass
  mcp_stdio: pass
  mcp_streamable_http: pass
  route_a_cloudflare_public_mcp: pass
  openai_secure_mcp_tunnel: pass
  debian_proot_playwright_worker: pass
  manual_login_vnc: pass
  stable_tmux_vnc: pass
  local_novnc: pass
  temporary_cloudflare_access_novnc: pass
  playwright_storage_state_capture: pass
  profile_domain_allowlist: pass
  mcp_browser_scan_with_profile: pass
  real_github_dummy_authenticated_scan: pass
  repeated_session_reuse: pass
  long_gap_session_continuity: pass
  phase_7p_profile_lifecycle: implemented_and_used_by_later_verified_runtime
  phase_7r_unified_persistent_browser_mcp: pass
  phase_7s_protected_routes_runtime_continuity: pass
  phase_7t_phone_only_cold_restart: pass
  phase_7u_unified_operator_lifecycle: pass
  phase_7v_automatic_novnc_handoff: pass
  documentation_closure_operator_reproducibility: in_progress
  cookie_json_import: deferred
  oauth: not_started_intentionally

ports:
  "3001":
    service: local HTTP API
    public_exposure: never
  "3002":
    service: Debian proot Playwright worker
    public_exposure: never
  "3003":
    service: MCP Streamable HTTP
    public_exposure: intentional protected MCP route only
  "5901":
    service: raw VNC
    public_exposure: never
  "6080":
    service: noVNC/websockify
    public_exposure: temporary protected human-controlled route only
  "3107":
    service: local demo login server
    public_exposure: never

runtime_modes:
  local_cli_api:
    commands:
      scan: node src/index.js scan example.com
      start: npm run api:start
      status: npm run api:status
      stop: npm run api:stop
    tunnel_required: false

  mcp_local:
    commands:
      stdio: npm run mcp
      http_start: npm run mcp:http:start
      http_status: npm run mcp:http:status
      http_stop: npm run mcp:http:stop

  route_a_cloudflare:
    endpoint: https://s22agent.aidesk.rest/mcp
    commands:
      start: npm run route:a:start
      status: npm run route:a:status
      stop: npm run route:a:stop
    constraints:
      - expose only MCP port 3003
      - keep API 3001 private
      - keep Playwright worker 3002 private
      - use bearer authentication

  openai_secure_mcp_tunnel:
    commands:
      termux_start: npm run openai:tunnel:start
      debian_client: npm run openai:tunnel:client:debian
      status: npm run openai:tunnel:status
      stop: npm run openai:tunnel:stop
    constraints:
      - do not start Route A in this mode
      - prompt for runtime key locally
      - never commit runtime key

  local_manual_login:
    commands:
      start: "SESSION_LOGIN_TIMEOUT_MS=1200000 npm run session:manual-login:novnc:start -- <profile> <login-url>"
      status: npm run session:manual-login:novnc:status -- <profile>
      complete: "SESSION_SCAN_SUPPRESS_EXCERPT=1 npm run session:manual-login:novnc:complete -- <profile> <authenticated-url> \"<expected-text>\""
      cancel: npm run session:manual-login:novnc:cancel -- <profile>
    constraints:
      - human-controlled login only
      - no automatic credential entry
      - no automatic public route

  temporary_public_novnc:
    public_hostname: s22login.aidesk.rest
    protection: Cloudflare Access
    commands:
      guide_start: npm run session:novnc:public-temp:start-guide -- <public-host>
      guide_status: npm run session:novnc:public-temp:status -- <public-host>
      guide_stop: npm run session:novnc:public-temp:stop-guide -- <public-host>
      tunnel_start: npm run session:novnc:public-temp:tunnel:start
      tunnel_status: npm run session:novnc:public-temp:tunnel:status
      tunnel_stop: npm run session:novnc:public-temp:tunnel:stop
    constraints:
      - temporary
      - intentionally started
      - human-controlled
      - never started by profile ensure logic
      - rotate historical tunnel token before another public test

mcp_tools:
  normal_mcp_http:
    total: 8
    job_radar:
      - job_radar_health
      - job_radar_scan
      - job_radar_list_pages
      - job_radar_get_page
      - job_radar_get_report
    browser:
      - browser_task_run
      - browser_task_handoff
      - browser_task_status
    notes:
      - legacy browser, login, and auth tools remain available only in historical or diagnostic code paths
      - normal MCP HTTP exposes only the intended eight-tool surface
      - browser-control handoff uses the temporary protected noVNC path
  profile_input_boundary:
    accepted:
      - named profile
      - target URL
      - optional expected text
    forbidden:
      - password
      - cookie
      - token
      - MFA code
      - arbitrary storageState path
      - storageState JSON

security_rules:
  - Never request or print passwords.
  - Never request or print cookies.
  - Never request or print session tokens.
  - Never request or print MFA codes.
  - Never print or paste storageState JSON.
  - Keep .runtime session files out of git.
  - Keep API port 3001 local-only.
  - Keep Playwright worker port 3002 local-only.
  - Keep raw VNC port 5901 local-only.
  - Keep noVNC local-only by default.
  - Public noVNC must be temporary, protected, intentionally started, and human-controlled.
  - Profile fallback logic must never auto-start public noVNC.
  - Keep MCP_HTTP_TOKEN out of git.
  - Keep CLOUDFLARE_TUNNEL_TOKEN out of git.
  - Keep CONTROL_PLANE_API_KEY out of git.
  - Rotate the historical Cloudflare tunnel token before future public testing.
  - Do not upgrade npm major solely because an update notice appears.
  - Do not propose Termux F-Droid migration by default.

known_issues:
  - Android may kill Termux under heavy runtime load.
  - tmux protects against SSH disconnect but not Android terminating Termux.
  - AnyDesk plus SSH plus VNC plus noVNC plus Chromium may cause disconnects.
  - Profile file existence does not prove a remote website session is valid.
  - Remote websites can expire, revoke, or challenge sessions.
  - Missing expected text can also mean the page content changed.
  - Termux or Android may restrict listener inspection through ss or netlink.
  - An early raw cloudflared log exposed a tunnel token before helper hardening.

